<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ordra</title>
    <script>
      (function() {
        const saved = localStorage.getItem('ordra_theme') || 'system';
        let theme = saved;
        if (saved === 'system') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        
        // Force light mode on all non-app pages (landing page, auth pages)
        const isAppRoute = window.location.pathname.startsWith('/app');
        if (!isAppRoute) {
          theme = 'light';
        }
        
        document.documentElement.setAttribute('data-theme', theme);
        
        // Inject theme-color meta tag and root background immediately
        const metaThemeColor = document.createElement('meta');
        metaThemeColor.name = 'theme-color';
        metaThemeColor.content = theme === 'dark' ? '#0f172a' : '#fafafa';
        document.head.appendChild(metaThemeColor);
        document.documentElement.style.backgroundColor = theme === 'dark' ? '#0f172a' : '#fafafa';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
